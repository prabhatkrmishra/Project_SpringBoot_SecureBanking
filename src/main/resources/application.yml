server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bank_db?createDatabaseIfNotExist=true
    username: root
    password: spring@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

jwt:
  secret: banksecurityapplicationjwtsecretkeybanksecurityapplication

logging:
  level:
    org.springframework.security: DEBUG